<!DOCTYPE html>
<html>
<head>
    <title>Sistemul Binar</title>
    <style>
        body{
            background-color:#1e3a8a;
            margin: 0;
        }

        .header{
            display: flex;
            align-items: center;      /* aliniere verticală */
            justify-content: space-between; /* spațiere între elemente */
            padding: 10px;
        }

        h1{
            color: white;
            font-size: 50px;
            margin: 0; /* elimină margina implicită a titlului */
        }

        .meniu{
            display: flex; /* aranjează link-urile pe orizontală */
        }

        .meniu a{ 
            color: aliceblue;
            padding: 15px 20px;
            font-size: 20px;
            text-decoration: none; /* elimină sublinierea link-urilor */
        }

        .meniu a:hover{
            color: black;
            background-color: yellow;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="logo.png" alt="Logo" width="100" height="100">

        <h1>Sistemul Binar</h1>

        <div class="meniu">
            <a href="acasa.html" target="main">Acasa</a>  
            <a href="conversie.html" target="main">Conversie</a>
            <a href="operatii.html" target="main">Operatii</a>
        </div>
    </div>

</body>
</html>

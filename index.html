<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofoliu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      max-width: 900px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover {
      background: #3b82f6;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Portofoliu site-uri</h1>

  <div class="grid">
    <button onclick="goToSite('S6JUD2026CLS10/index.html')">Website 1</button>
    <button onclick="goToSite('CLS10JUD2024S6/index.html')">Website 2</button>
    <button onclick="goToSite('S6NAT2024/index.html')">Website 3</button>
    <button onclick="goToSite('S25CLS9NAT/index.html')">Website 4</button>
    <button onclick="goToSite('S82022NAT/index.html.html')">Website 5</button>
    <button onclick="goToSite('site6.html')">Website 6</button>
    <button onclick="goToSite('site7.html')">Website 7</button>
    <button onclick="goToSite('site8.html')">Website 8</button>
    <button onclick="goToSite('site9.html')">Website 9</button>
    <button onclick="goToSite('site10.html')">Website 10</button>
  </div>

  <script>
    function goToSite(page) {
      window.open(page, '_blank');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofoliu</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      margin: 20px 0 30px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 900px;
    }

    button {
      padding: 18px 12px;
      border: none;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #3b82f6;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(59,130,246,0.4);
    }

    button:active {
      transform: scale(0.97);
    }

    /* Extra spacing on very small screens */
    @media (max-width: 400px) {
      button {
        font-size: 0.9rem;
        padding: 14px;
      }
    }
  </style>
</head>
<body>

  <h1>Portofoliu site-uri</h1>

  <div class="grid">
    <button onclick="goToSite('S6JUD2026CLS10/index.html')">CLS X JUD 2026</button>
    <button onclick="goToSite('CLS10JUD2024S6/index.html')">CLS X JUD 2024</button>
    <button onclick="goToSite('S6NAT2024/index.html')">CLS IX NAT 2024</button>
    <button onclick="goToSite('S25CLS9NAT/index.html')">CLS IX NAT 2025</button>
    <button onclick="goToSite('S82022NAT/index.html')">CLS IX NAT 2022</button>
    <button onclick="goToSite('S2023NATCLS9.html')">CLS IX NAT 2023</button>
    <button onclick="goToSite('site7.html')">CLS IX NAT 2019</button>
    <button onclick="goToSite('site8.html')">Website 8</button>
    <button onclick="goToSite('site9.html')">Website 9</button>
    <button onclick="goToSite('site10.html')">Website 10</button>
  </div>

  <script>
    function goToSite(page) {
      window.open(page, '_blank');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
body{display:flex;justify-content:center} /* Centrarea galeriei pe pagină */
.gallery{display:flex;gap:10px} /* Spațiere între imagini */
.gallery a{position:relative} /* Pentru a poziționa textul peste imagine */
.gallery img{width:200px;height:200px;object-fit:cover;border:2px solid #ccc} /* Stilizarea imaginilor */
.gallery a span{ /* Textul care apare la hover */
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#0008;color:#fff;opacity:0;transition:.3s
}
.gallery a:hover span{opacity:1} /* Afișarea textului la hover */
.gallery a:hover img{filter:brightness(70%)} /* Întunecarea imaginii la hover */
</style>
</head>
<body>

<div class="gallery"> /* Container pentru galerie */
  <a href="ECO1.jpg" target="_blank"><img src="ECO1.jpg"><span>ECO1.jpg</span></a>
  <a href="ECO5.jpg" target="_blank"><img src="ECO5.jpg"><span>ECO5.jpg</span></a>
  <a href="ECO6.jpg" target="_blank"><img src="ECO6.jpg"><span>ECO6.jpg</span></a>
  <a href="ECO8.jpg" target="_blank"><img src="ECO8.jpg"><span>ECO8.jpg</span></a>
  <a href="ECO2.jpg" target="_blank"><img src="ECO2.jpg"><span>ECO2.jpg</span></a>
</div>

</body>
</html>

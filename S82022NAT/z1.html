<!DOCTYPE>
<html>
    <head>
        <style>
            body {
                background-image: url('fundal3.jpg');
                background-repeat: no-repeat;
                background-size: cover; 
                display: inline-block; /* fundal cat textul de mare */
                padding: 5px 10px;
            }
            h1{
                color:red;
                background-color: lightgreen;
                border-radius: 15px;
                animation: miscare 10s linear infinite;
            }
            @keyframes miscare{
                from {transform: translateX(-370%);}
                to {transform: translateX(370%);}
            }
        </style>
    </head>
    <body>
        <img src="17.png" width="150px">
        <h1>Avem încredere în natură. Este în felul nostru de a fi.</h1>
    </body>
